<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dbt + AI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e1117;--surface:#161b22;--raised:#1c2129;--border:#2d333b;
  --text:#e6edf3;--muted:#8b949e;
  --purple:#7c3aed;--pl:#a78bfa;--pdim:rgba(124,58,237,.12);
  --green:#3fb950;--blue:#58a6ff;--amber:#d29922;--red:#f85149;--orange:#ff6b35;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1000px;margin:0 auto;padding:24px 20px 80px}
.hdr{text-align:center;margin-bottom:24px}
.hdr-tag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--pl);background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);padding:4px 13px;border-radius:99px;margin-bottom:10px}
.hdr h1{font-size:clamp(20px,3.5vw,30px);font-weight:600;color:#fff;margin-bottom:5px}
.hdr p{color:var(--muted);font-size:13px}
.nav{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:5px;gap:3px;margin-bottom:20px;flex-wrap:wrap}
.ns{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:8px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;font-family:var(--sans)}
.ns:hover{background:var(--raised);color:var(--text)}
.ns.on{background:var(--purple);color:#fff}
.ns-n{font-family:var(--mono);font-size:9px;opacity:.6}
.ns-l{font-size:11px;font-weight:500;text-align:center;line-height:1.2}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px}
.card-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.ctrls{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
.nbtn{padding:9px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.nbtn:hover:not(:disabled){border-color:var(--purple);color:var(--pl)}
.nbtn:disabled{opacity:.3;cursor:default}
.nbtn.pri{background:var(--purple);border-color:var(--purple);color:#fff}
.nbtn.pri:hover:not(:disabled){background:#6d28d9}
.prog{font-family:var(--mono);font-size:11px;color:var(--muted)}
.cap{font-size:12px;color:var(--muted);line-height:1.6;margin-top:14px;padding:10px 12px;background:var(--raised);border-radius:8px;border:1px solid var(--border)}
</style>
</head>
<body>
<div class="app">
<div style="margin-bottom:24px"><a href="../" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#444c56;text-decoration:none" onmouseover="this.style.color='#8b949e'" onmouseout="this.style.color='#444c56'">← all explainers</a></div>
<div class="hdr">
  <div class="hdr-tag">dbt Labs · AI / LLM</div>
  <h1>From Data to Conversation</h1>
  <p>How dbt connects your warehouse to AI agents, with the same trust layer that powers your BI tools.</p>
</div>
<div class="nav" id="snav"></div>
<div id="scontent"></div>
<div class="ctrls">
  <button class="nbtn" id="pb" onclick="nav(-1)">← Back</button>
  <span class="prog" id="pg"></span>
  <button class="nbtn pri" id="nb" onclick="nav(1)">Next →</button>
</div>
<div style="text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid #21262d"><a href="https://github.com/cedricturner/dbt-artifacts" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#444c56;text-decoration:none" onmouseover="this.style.color='#8b949e'" onmouseout="this.style.color='#444c56'"><svg height="13" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>view source on github</a></div>
</div>

<script>
var cur = 0;

/* ─── STEP RENDERERS ─────────────────────────────────────── */

function renderStep0() {
  return `<div class="card">
  <div class="card-title">Dashboard vs. Conversation</div>
  <div class="card-sub">Same data, same metrics. Different interface.</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

    <!-- BI side -->

      <div style="padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block;flex-shrink:0"></span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px">BI DASHBOARD</span>
      </div>
      <div style="padding:14px;display:flex;flex-direction:column;gap:10px">
        <!-- KPI row -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
            <div style="font-size:20px;font-weight:600;font-family:var(--mono);color:var(--blue)">$12M</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">Revenue</div>
            <div style="font-size:10px;color:var(--green);margin-top:3px">↑ 11.8% YoY</div>
          </div>
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
            <div style="font-size:20px;font-weight:600;font-family:var(--mono);color:var(--green)">42K</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">Active Users</div>
            <div style="font-size:10px;color:var(--green);margin-top:3px">↑ 6.2%</div>
          </div>
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
            <div style="font-size:20px;font-weight:600;font-family:var(--mono);color:var(--red)">3.1%</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">Churn Rate</div>
            <div style="font-size:10px;color:var(--red);margin-top:3px">↑ 0.3pp</div>
          </div>
        </div>
        <!-- Bar chart -->
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">

          <div style="display:flex;align-items:flex-end;gap:10px;height:80px;padding:0 4px">
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">

            </div>
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">

              <div style="font-family:var(--mono);font-size:9px;color:var(--blue)">$3.1M</div>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">

            <polyline points="0,50 52,42 104,35 156,28 208,20 260,15" fill="none" stroke="rgba(88,166,255,.6)" stroke-width="2"/>

        </div>

          <span style="display:block;font-family:var(--mono);font-size:10px;color:var(--pl);background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:4px;padding:3px 7px;margin-bottom:5px">→ query_metrics(cac, region=East, group_by=[month])</span>

  </div>
  <div class="cap">The dashboard answers the question you thought to ask. The agent follows the one you're actually asking, and keeps going. Same underlying dbt metrics, same definitions. The interface is what changes.</div>
</div>`;
}

function renderStep1() {
  return `<div class="card">
  <div class="card-title">The Stack: source to AI</div>
  <div class="card-sub">dbt sits at the center: it transforms raw data, defines business metrics in the Semantic Layer, and exposes everything via APIs. The MCP Server bridges dbt's APIs to LLMs, giving AI tools governed, structured access to the same data your dashboards use.</div>
  <div style="background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:16px;overflow-x:auto">
    <img src="stack-diagram.svg" alt="The Stack: source to AI architecture diagram" style="width:100%;display:block;border-radius:6px;background:#fff"/>
  </div>
  <div class="cap">The Semantic Layer and dbt APIs live inside the dbt Platform, defined once, reused by everyone. The MCP Server is the bridge: it wraps those APIs into structured tools that LLMs can reason with. Whether you're in Tableau or talking to Claude, you're getting the same governed data.</div>
</div>`;
}

window.setTier = function(i) {
  var tiers = window._tiers;
  if (!tiers) return;
  for (var j = 0; j < tiers.length; j++) {
    var pill = document.getElementById('tierpill' + j);
    if (pill) {
      var t = tiers[j];
      pill.style.background  = j === i ? t.bg     : 'var(--raised)';
      pill.style.borderColor = j === i ? t.border : 'var(--border)';
      pill.querySelector('span').style.color = j === i ? t.color : 'var(--muted)';
    }
  }
  var hdr  = document.getElementById('tier-hdr');
  var body = document.getElementById('tier-body');
  if (hdr)  hdr.textContent = 'TIER ' + tiers[i].num + ': ' + tiers[i].label.split(':')[1].trim().toUpperCase();
  if (body) body.innerHTML  = window._buildTierDetail(i);
};

        '<div style="color:var(--muted);font-family:var(--mono);font-size:8px;letter-spacing:1px;margin-bottom:8px">WHAT THEY CAN DO</div>' +
        check('IDE, CLI &amp; Jobs') +
        check('All models &amp; metrics') +
        check('Write &amp; deploy') +
        check('Catalog, Docs &amp; Lineage') +
        check('Full audit log') +
      '</div>' +
    '</div>';

  // ── Column: Read-Only Seat ─────────────────────────────────────────────────
  var roCol =
    '<div style="border:1.5px solid rgba(63,185,80,.5);border-radius:10px;overflow:hidden">' +
      '<div style="background:rgba(63,185,80,.1);padding:14px 15px;border-bottom:1px solid rgba(63,185,80,.2)">' +
        '<div style="color:#3fb950;font-size:13px;font-weight:600;margin-bottom:2px">Read-Only Seat</div>' +
        '<div style="color:var(--muted);font-size:10px">Consume, explore &amp; analyze</div>' +
      '</div>' +
      '<div style="padding:13px 15px;border-bottom:1px solid var(--border)">' +
        '<div style="color:var(--muted);font-family:var(--mono);font-size:8px;letter-spacing:1px;margin-bottom:7px">HOW THEY LOG IN</div>' +
        pill('INTERNAL', '#3fb950') +
        '<div style="color:var(--muted);font-size:10px;margin-top:6px;margin-bottom:5px"><strong style="color:var(--text)">Today:</strong> Personal Access Token (PAT)</div>' +
        '<div style="color:#3fb950;font-size:10px"><strong>Coming soon:</strong> OAuth "login with dbt", short-lived and SSO-compatible</div>' +
      '</div>' +
      '<div style="padding:13px 15px">' +
        '<div style="color:var(--muted);font-family:var(--mono);font-size:8px;letter-spacing:1px;margin-bottom:8px">WHAT THEY CAN DO</div>' +
        check('Catalog, Docs &amp; Lineage') +
        check('Source Freshness &amp; job alerts') +
        check('API access') +
        check('Semantic Layer &amp; MCP <span style="color:#3fb950;font-size:9px">(H1 2026)</span>') +
        check('dbt Insights <span style="color:#3fb950;font-size:9px">(H2 2026)</span>') +
        cross('IDE, CLI, Jobs or deploy') +
      '</div>' +
    '</div>';

  // ── Column: LLMs & AI Agents ──────────────────────────────────────────────
  var aiCol =
    '<div style="border:1.5px solid rgba(210,153,34,.5);border-radius:10px;overflow:hidden">' +
      '<div style="background:rgba(210,153,34,.1);padding:14px 15px;border-bottom:1px solid rgba(210,153,34,.2)">' +
        '<div style="color:#d29922;font-size:13px;font-weight:600;margin-bottom:2px">LLMs &amp; AI Agents</div>' +
        '<div style="color:var(--muted);font-size:10px">Claude, MCP connections, shared BI tools</div>' +
      '</div>' +
      '<div style="padding:13px 15px;border-bottom:1px solid var(--border)">' +
        '<div style="color:var(--muted);font-family:var(--mono);font-size:8px;letter-spacing:1px;margin-bottom:7px">HOW THEY CONNECT</div>' +
        pill('PROGRAMMATIC / MACHINE', '#d29922') +
        '<div style="color:var(--muted);font-size:10px;margin-top:6px"><strong style="color:var(--text)">Service Token</strong>: one per use case or team, scoped to a domain. Not tied to a person. Revoke without affecting anyone else.</div>' +
      '</div>' +
      '<div style="padding:13px 15px">' +
        '<div style="color:var(--muted);font-family:var(--mono);font-size:8px;letter-spacing:1px;margin-bottom:8px">WHAT THEY CAN DO</div>' +
        check('Semantic Layer, governed metrics only') +
        check('MetricFlow queries via MCP') +
        check('Scoped to assigned domain') +
        check('Audit logged per token') +
        check('Same path for shared BI tools (Tableau Server, Power BI)') +
        cross('Raw SQL or direct model access') +
      '</div>' +
    '</div>';

  // ── Internal vs External callout ───────────────────────────────────────────
  var authNote =
    '<div style="display:flex;gap:10px;margin-top:10px">' +
      '<div style="flex:1;background:rgba(63,185,80,.05);border:1px solid rgba(63,185,80,.2);border-radius:7px;padding:10px 13px;display:flex;align-items:center;gap:10px">' +
        '<div style="font-size:18px">👤</div>' +
        '<div><div style="color:#3fb950;font-size:10.5px;font-weight:600;margin-bottom:2px">Personal login (PAT or OAuth)</div>' +
        '<div style="color:var(--muted);font-size:10px">Developer &amp; Read-Only seats. Tied to a real person, audited by user. Also covers personal BI connections (your own Excel, Tableau Desktop).</div></div>' +
      '</div>' +
      '<div style="flex:1;background:rgba(210,153,34,.06);border:1px solid rgba(210,153,34,.2);border-radius:7px;padding:10px 13px;display:flex;align-items:center;gap:10px">' +
        '<div style="font-size:18px">🔑</div>' +
        '<div><div style="color:#d29922;font-size:10.5px;font-weight:600;margin-bottom:2px">Service Token (machine credentials)</div>' +
        '<div style="color:var(--muted);font-size:10px">AI agents, Claude, MCP connections, and shared BI tools (Tableau Server, Power BI workspace). Not tied to a person. Scoped and revocable per use case.</div></div>' +
      '</div>' +
    '</div>';

  // ── Two gates ──────────────────────────────────────────────────────────────
  var gates =
    '<div style="display:flex;gap:10px;margin-top:10px">' +
      '<div style="flex:1;background:rgba(255,107,53,.06);border:1.5px solid #ff6b35;border-radius:8px;padding:13px 15px">' +
        '<div style="color:#ff6b35;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.5px;margin-bottom:5px">GATE 1: dbt</div>' +
        '<div style="color:var(--text);font-size:11px;font-weight:600;margin-bottom:4px">Controls what you can ask for</div>' +
        '<div style="color:var(--muted);font-size:10px;line-height:1.6">Your role in dbt determines which models and metrics you\'re even allowed to request, regardless of what the warehouse would technically allow.</div>' +
      '</div>' +
      '<div style="flex:1;background:rgba(88,166,255,.06);border:1.5px solid #58a6ff;border-radius:8px;padding:13px 15px">' +
        '<div style="color:#58a6ff;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.5px;margin-bottom:5px">GATE 2: Warehouse</div>' +
        '<div style="color:var(--text);font-size:11px;font-weight:600;margin-bottom:4px">Controls which rows come back</div>' +
        '<div style="color:var(--muted);font-size:10px;line-height:1.6">Row-level security is enforced at query time by the warehouse itself. This is the final backstop. dbt and MCP cannot bypass it.</div>' +
      '</div>' +
    '</div>';

  return '<div class="card">' +
    '<div class="card-title">Security &amp; Governance</div>' +
    '<div class="card-sub">Same warehouse. Three types of access. Every query passes two gates.</div>' +

    // Three identity columns
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:4px">' +
      devCol + roCol + aiCol +
    '</div>' +

    // Internal vs external note
    authNote +

    // Section divider
    '<div style="border-top:1px solid var(--border);margin:14px 0 10px;display:flex;align-items:center;gap:10px">' +
      '<span style="color:#ff6b35;font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:1.5px;white-space:nowrap;background:var(--surface);padding-right:10px">THE TWO GATES</span>' +
    '</div>' +

    gates +
  '</div>';
}

var STEPS = [
  { lbl: 'The Shift',      render: renderStep0 },
  { lbl: 'The Stack',      render: renderStep1 },
  { lbl: 'Semantic Layer', render: renderStep2 },
  { lbl: 'Agent Reasoning', render: renderStep3 },
  { lbl: 'Use Cases',      render: renderStep4 },
  { lbl: 'Configurations', render: renderStep5 },
  { lbl: 'Security',       render: renderStep6 },
];

/* ─── NAV ─────────────────────────────────────────────── */
function renderNav() {
  var html = '';
  for (var i = 0; i < STEPS.length; i++) {
    html += '<button class="ns ' + (i===cur?'on':'') + '" onclick="goTo(' + i + ')">';
    html += '<span class="ns-n">' + String(i+1).padStart(2,'0') + '</span>';
    html += '<span class="ns-l">' + STEPS[i].lbl + '</span>';
    html += '</button>';
  }
  document.getElementById('snav').innerHTML = html;
}

function renderContent() {
  document.getElementById('scontent').innerHTML = STEPS[cur].render();
  document.getElementById('pg').textContent = (cur+1) + ' / ' + STEPS.length;
  document.getElementById('pb').disabled = cur === 0;
  var nb = document.getElementById('nb');
  nb.disabled = cur === STEPS.length - 1;
  nb.textContent = cur === STEPS.length - 1 ? 'Done' : 'Next →';
}

function goTo(i) { cur = i; renderNav(); renderContent(); window.scrollTo({top:0,behavior:'smooth'}); }
function nav(d) { if (cur+d >= 0 && cur+d < STEPS.length) goTo(cur+d); }

renderNav();
renderContent();
</script>
</body>
</html>
