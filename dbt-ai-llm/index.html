<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dbt + AI — Conversational Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e1117;--surface:#161b22;--raised:#1c2129;--border:#2d333b;
  --text:#e6edf3;--muted:#8b949e;
  --purple:#7c3aed;--pl:#a78bfa;--pdim:rgba(124,58,237,.12);
  --green:#3fb950;--blue:#58a6ff;--amber:#d29922;--red:#f85149;--orange:#ff6b35;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1000px;margin:0 auto;padding:24px 20px 80px}
.hdr{text-align:center;margin-bottom:24px}
.hdr-tag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--pl);background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);padding:4px 13px;border-radius:99px;margin-bottom:10px}
.hdr h1{font-size:clamp(20px,3.5vw,30px);font-weight:600;color:#fff;margin-bottom:5px}
.hdr p{color:var(--muted);font-size:13px}
.nav{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:5px;gap:3px;margin-bottom:20px;flex-wrap:wrap}
.ns{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:8px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;font-family:var(--sans)}
.ns:hover{background:var(--raised);color:var(--text)}
.ns.on{background:var(--purple);color:#fff}
.ns-n{font-family:var(--mono);font-size:9px;opacity:.6}
.ns-l{font-size:11px;font-weight:500;text-align:center;line-height:1.2}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px}
.card-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.ctrls{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
.nbtn{padding:9px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.nbtn:hover:not(:disabled){border-color:var(--purple);color:var(--pl)}
.nbtn:disabled{opacity:.3;cursor:default}
.nbtn.pri{background:var(--purple);border-color:var(--purple);color:#fff}
.nbtn.pri:hover:not(:disabled){background:#6d28d9}
.prog{font-family:var(--mono);font-size:11px;color:var(--muted)}
.cap{font-size:12px;color:var(--muted);line-height:1.6;margin-top:14px;padding:10px 12px;background:var(--raised);border-radius:8px;border:1px solid var(--border)}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-tag">dbt Labs · AI / LLM</div>
  <h1>From Data to Conversation</h1>
  <p>How dbt connects your warehouse to AI agents — with the same trust layer that powers your BI tools.</p>
</div>
<div class="nav" id="snav"></div>
<div id="scontent"></div>
<div class="ctrls">
  <button class="nbtn" id="pb" onclick="nav(-1)">← Back</button>
  <span class="prog" id="pg"></span>
  <button class="nbtn pri" id="nb" onclick="nav(1)">Next →</button>
</div>
<div style="text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid #21262d"><a href="https://github.com/cedricturner/dbt-artifacts" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#444c56;text-decoration:none" onmouseover="this.style.color='#8b949e'" onmouseout="this.style.color='#444c56'"><svg height="13" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>view source on github</a></div>
</div>

<script>
var cur = 0;

/* ─── STEP RENDERERS ─────────────────────────────────────── */

function renderStep0() {
  return `<div class="card">
  <div class="card-title">Dashboard vs. Conversation</div>
  <div class="card-sub">Same data, same metrics — different interface.</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

    <!-- BI side -->
    <div style="background:var(--raised);border:1px solid var(--border);border-radius:10px;overflow:hidden">
      <div style="padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block;flex-shrink:0"></span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px">BI DASHBOARD</span>
      </div>
      <div style="padding:14px;display:flex;flex-direction:column;gap:10px">
        <!-- KPI row -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
            <div style="font-size:20px;font-weight:600;font-family:var(--mono);color:var(--blue)">$12M</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">Revenue</div>
            <div style="font-size:10px;color:var(--green);margin-top:3px">↑ 11.8% YoY</div>
          </div>
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
            <div style="font-size:20px;font-weight:600;font-family:var(--mono);color:var(--green)">42K</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">Active Users</div>
            <div style="font-size:10px;color:var(--green);margin-top:3px">↑ 6.2%</div>
          </div>
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
            <div style="font-size:20px;font-weight:600;font-family:var(--mono);color:var(--red)">3.1%</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">Churn Rate</div>
            <div style="font-size:10px;color:var(--red);margin-top:3px">↑ 0.3pp</div>
          </div>
        </div>
        <!-- Bar chart -->
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:12px;letter-spacing:1px">REVENUE BY REGION · Q4</div>
          <div style="display:flex;align-items:flex-end;gap:10px;height:80px;padding:0 4px">
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">
                <div style="width:100%;height:76%;background:linear-gradient(180deg,rgba(88,166,255,.8),rgba(88,166,255,.4));border-radius:3px 3px 0 0"></div>
              </div>
              <div style="font-size:9px;color:var(--muted)">North</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--blue)">$4.2M</div>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">
                <div style="width:100%;height:55%;background:linear-gradient(180deg,rgba(88,166,255,.7),rgba(88,166,255,.3));border-radius:3px 3px 0 0"></div>
              </div>
              <div style="font-size:9px;color:var(--muted)">West</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--blue)">$3.1M</div>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">
                <div style="width:100%;height:45%;background:linear-gradient(180deg,rgba(88,166,255,.6),rgba(88,166,255,.25));border-radius:3px 3px 0 0"></div>
              </div>
              <div style="font-size:9px;color:var(--muted)">South</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--blue)">$2.8M</div>

            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">

        <!-- Second chart: trend line mock -->

          <svg viewBox="0 0 260 60" style="width:100%;display:block">
            <polyline points="0,50 52,42 104,35 156,28 208,20 260,15" fill="none" stroke="rgba(88,166,255,.6)" stroke-width="2"/>

            <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(88,166,255,.2)"/><stop offset="100%" stop-color="rgba(88,166,255,0)"/></linearGradient></defs>
            <path d="M0,50 52,42 104,35 156,28 208,20 260,15 V60 H0Z" fill="url(#tg)"/>
            ${['Jul','Aug','Sep','Oct','Nov','Dec'].map((m,i)=>`<text x="${i*52}" y="58" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="7" text-anchor="middle">${m}</text>`).join('')}
          </svg>
        </div>
        <div style="font-size:10px;color:var(--muted);text-align:center;padding:6px;background:var(--bg);border:1px dashed var(--border);border-radius:6px">Pre-built views · fixed filters · need analyst to go deeper</div>
      </div>
    </div>

    <!-- AI side -->
    <div style="background:var(--raised);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column">
      <div style="padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--purple);display:inline-block;flex-shrink:0"></span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px">AI AGENT</span>
      </div>
      <div style="padding:14px;flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto">
        <div style="align-self:flex-end;max-width:88%;padding:9px 12px;border-radius:10px;font-size:12px;line-height:1.5;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.3);color:#c4b5fd">What drove East region's growth last quarter?</div>

          East growth was almost entirely digital — up 34% QoQ. New customer acquisition, not expansion.
        </div>
        <div style="align-self:flex-end;max-width:88%;padding:9px 12px;border-radius:10px;font-size:12px;line-height:1.5;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.3);color:#c4b5fd">Is CAC holding up or are we buying that growth?</div>
        <div style="align-self:flex-start;max-width:92%;padding:9px 12px;border-radius:10px;font-size:12px;line-height:1.5;background:var(--bg);border:1px solid var(--border)">
          <span style="display:block;font-family:var(--mono);font-size:10px;color:var(--pl);background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:4px;padding:3px 7px;margin-bottom:5px">→ query_metrics(cac, region=East, group_by=[month])</span>

      <div style="font-size:10px;color:var(--green);text-align:center;padding:7px;border-top:1px solid var(--border);background:rgba(63,185,80,.04)">Governed metrics · follows the thread · no ticket required</div>
    </div>
  </div>
  <div class="cap">The dashboard answers the question you thought to ask. The agent follows the one you're actually asking — and keeps going. Same underlying dbt metrics, same definitions. The interface is what changes.</div>
</div>`;
}

function renderStep3() {
  var tabs = [
    {
      label: 'Revenue by region',
      q: 'What was revenue last quarter, broken down by region?',
      steps: [
        { n:'01', label:'Discover available metrics', call:'list_metrics()', result:'[revenue, churn_rate, cac, active_users, avg_order_value]' },
        { n:'02', label:'Check what dimensions revenue supports', call:'get_dimensions(metrics=["revenue"])', result:'[region, channel, status, metric_time__quarter]' },
        { n:'03', label:'Query the metric', call:'query_metrics("revenue", group_by=["region", "metric_time__quarter"], where=["Q4 2025"])', result:'{North:$4.2M, South:$2.8M, West:$3.1M, East:$1.9M}' },
      ],
      answer: 'Q4 revenue totaled $12.0M. North led at $4.2M, followed by West ($3.1M), South ($2.8M), and East ($1.9M — fastest-growing at +18.8% YoY).'
    },
    {
      label: 'Churn by segment',
      q: 'Is churn getting worse, and which segment is driving it?',
      steps: [
        { n:'01', label:'Confirm metric and dimensions', call:'get_dimensions(metrics=["churn_rate"])', result:'[plan_type, region, cohort_month, metric_time]' },
        { n:'02', label:'Query trend across segments', call:'query_metrics("churn_rate", group_by=["plan_type", "metric_time__quarter"])', result:'{free: 2.1%→3.4%, pro: 0.8%→0.9%, enterprise: 0.2%→0.2%}' },
        { n:'03', label:'Pull volume for context', call:'query_metrics("active_users", group_by=["plan_type"])', result:'{free: 28K, pro: 11K, enterprise: 3K}' },
      ],
      answer: 'Churn is rising, but only in the free tier — up from 2.1% to 3.4% over 3 quarters. Pro and enterprise are flat. This looks like a conversion or onboarding issue, not a product-wide problem.'
    },
    {
      label: 'CAC by channel',
      q: 'How has CAC trended and does it vary by acquisition channel?',
      steps: [
        { n:'01', label:'Verify channel dimension on CAC', call:'get_dimensions(metrics=["cac"])', result:'[channel, region, metric_time__month, metric_time__quarter]' },
        { n:'02', label:'Query CAC trend by channel', call:'query_metrics("cac", group_by=["channel", "metric_time__quarter"])', result:'{paid_search: $320→$410, organic: $90→$95, social: $210→$380}' },
        { n:'03', label:'Compare new customer volume', call:'query_metrics("new_customers", group_by=["channel"])', result:'{paid_search: 1240, organic: 890, social: 560}' },
      ],
      answer: 'CAC is rising across the board, but social is the outlier — up 81% QoQ with the lowest volume. Paid search costs more but drives 2x the customers. Worth reviewing social targeting before next budget cycle.'
    },
  ];

  window._loopTabs = tabs;
  window._loopActive = 0;

  function buildLoop(ti) {
    var t = tabs[ti];
    var html = '';
    html += '<div style="margin-bottom:12px;padding:10px 13px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-radius:8px">';
    html += '<div style="font-family:var(--mono);font-size:9px;color:var(--pl);margin-bottom:4px;letter-spacing:1px">USER QUESTION</div>';
    html += '<div style="font-size:13px;color:#fff">' + t.q + '</div>';
    html += '</div>';

    // flow diagram
    html += '<div style="display:flex;flex-direction:column;gap:6px">';
    for (var i = 0; i < t.steps.length; i++) {
      var s = t.steps[i];
      html += '<div style="display:flex;gap:0;align-items:stretch">';
      // connector line
      html += '<div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;padding-top:4px">';
      html += '<div style="width:22px;height:22px;border-radius:6px;background:var(--purple);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:600;color:#fff;flex-shrink:0">' + s.n + '</div>';
      if (i < t.steps.length - 1) html += '<div style="width:2px;flex:1;background:rgba(124,58,237,.3);margin-top:4px;min-height:12px"></div>';
      html += '</div>';
      // content
      html += '<div style="flex:1;margin-left:10px;padding:8px 12px;background:var(--raised);border:1px solid var(--border);border-radius:8px;margin-bottom:' + (i < t.steps.length-1 ? '6' : '0') + 'px">';
      html += '<div style="font-size:11px;color:var(--muted);margin-bottom:5px">' + s.label + '</div>';
      html += '<div style="font-family:var(--mono);font-size:10px;color:var(--pl);background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:4px;padding:4px 8px;margin-bottom:4px">&rarr; ' + s.call + '</div>';
      html += '<div style="font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(63,185,80,.06);border:1px solid rgba(63,185,80,.15);border-radius:4px;padding:4px 8px">&larr; ' + s.result + '</div>';
      html += '</div>';
      html += '</div>';
    }
    html += '</div>';

    // answer
    html += '<div style="margin-top:10px;padding:11px 13px;background:rgba(63,185,80,.06);border:1px solid rgba(63,185,80,.2);border-radius:8px">';
    html += '<div style="font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:1px;margin-bottom:5px">AGENT RESPONSE</div>';
    html += '<div style="font-size:12px;color:var(--text);line-height:1.6">' + t.answer + '</div>';
    html += '</div>';

    return html;
  }

  window._buildLoop = buildLoop;

  var tabsHtml = '<div style="display:flex;border-bottom:1px solid var(--border);background:var(--bg)">';
  for (var i = 0; i < tabs.length; i++) {
    tabsHtml += '<button onclick="switchLoopTab(' + i + ')" id="ltab' + i + '" style="flex:1;padding:9px 6px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;color:' + (i===0?'var(--pl)':'var(--muted)') + ';border:none;background:transparent;font-family:var(--sans);border-bottom:2px solid ' + (i===0?'var(--purple)':'transparent') + ';transition:all .2s">' + tabs[i].label + '</button>';

      else if (step.type === 'result') { bg = 'rgba(63,185,80,.06)';  color = 'var(--green)'; prefix = '← '; }
      else if (step.type === 'ok')     { bg = 'rgba(63,185,80,.06)';  color = 'var(--green)'; prefix = '✓ '; }
      else if (step.type === 'warn')   { bg = 'rgba(210,153,34,.07)'; color = 'var(--amber)'; prefix = '⚠ '; }
      else if (step.type === 'think')  { bg = 'rgba(255,255,255,.03)';color = 'var(--muted)'; prefix = '… '; }
      else                             { bg = 'rgba(88,166,255,.06)';  color = 'var(--blue)';  prefix = '';   }
      html += '<div style="font-family:var(--mono);font-size:10px;color:' + color + ';background:' + bg + ';border-radius:4px;padding:4px 8px;white-space:pre-wrap;line-height:1.5">' + prefix + step.text + '</div>';
    }
    html += '</div></div>';
    return html;
  }

  window._buildConfig = buildConfig;

  // left pills
  var pillsHtml = '<div style="display:flex;flex-direction:column;gap:6px" id="cfgpills">';
  for (var i = 0; i < configs.length; i++) {
    var c = configs[i];
    var active = i === 0;
    pillsHtml += '<div onclick="setCfg(' + i + ')" id="cfgpill' + i + '" style="padding:11px 14px;background:' + (active ? c.bg : 'var(--raised)') + ';border:1px solid ' + (active ? c.border : 'var(--border)') + ';border-radius:9px;cursor:pointer;transition:all .2s">';
    pillsHtml += '<div style="display:flex;align-items:center;gap:8px">';
    pillsHtml += '<span style="font-family:var(--mono);font-size:11px;font-weight:600;color:' + (active ? c.color : 'var(--muted)') + '">' + c.num + '</span>';
    pillsHtml += '<div><div style="font-size:12px;font-weight:600;color:var(--text)">' + c.title + '</div>';
    pillsHtml += '<div style="font-size:10px;color:var(--muted);margin-top:1px">' + c.sub + '</div></div>';
    pillsHtml += '</div></div>';
  }
  pillsHtml += '</div>';

  var visHtml = '<div style="background:var(--raised);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column">';
  visHtml += '<div style="padding:9px 13px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px" id="cfg-hdr">' + configs[0].title.toUpperCase() + '</div>';
  visHtml += '<div style="padding:16px;flex:1;overflow-y:auto;max-height:600px" id="cfg-body">' + buildConfig(0) + '</div>';
  visHtml += '</div>';

  return '<div class="card"><div class="card-title">Cursor / Claude — 4 configurations</div>' +
    '<div class="card-sub">Each layer of dbt adds something the AI agent couldn\'t do before. Click to compare.</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1.6fr;gap:14px">' +
    pillsHtml + visHtml +
    '</div>' +
    '<div class="cap">Configuration 4 is the full picture — but configurations 2 and 3 are already meaningful standalone improvements. The question isn\'t "do you need all of it" — it\'s "how much of your data workflow do you want the AI to understand?"</div>' +
    '</div>';
}

window.setCfg = function(i) {
  var configs = window._cfgCases;
  if (!configs) return;
  for (var j = 0; j < configs.length; j++) {
    var pill = document.getElementById('cfgpill' + j);
    if (pill) {
      var c = configs[j];
      pill.style.background   = j === i ? c.bg     : 'var(--raised)';
      pill.style.borderColor  = j === i ? c.border : 'var(--border)';
      pill.querySelector('span').style.color = j === i ? c.color : 'var(--muted)';
    }
  }
  var hdr  = document.getElementById('cfg-hdr');
  var body = document.getElementById('cfg-body');
  if (hdr)  hdr.textContent  = configs[i].title.toUpperCase();
  if (body) body.innerHTML   = window._buildConfig(i);
};

/* ─── NAV ─────────────────────────────────────────────── */
function renderNav() {
  var html = '';
  for (var i = 0; i < STEPS.length; i++) {
    html += '<button class="ns ' + (i===cur?'on':'') + '" onclick="goTo(' + i + ')">';
    html += '<span class="ns-n">' + String(i+1).padStart(2,'0') + '</span>';
    html += '<span class="ns-l">' + STEPS[i].lbl + '</span>';
    html += '</button>';
  }
  document.getElementById('snav').innerHTML = html;
}

function renderContent() {
  document.getElementById('scontent').innerHTML = STEPS[cur].render();
  document.getElementById('pg').textContent = (cur+1) + ' / ' + STEPS.length;
  document.getElementById('pb').disabled = cur === 0;
  var nb = document.getElementById('nb');
  nb.disabled = cur === STEPS.length - 1;
  nb.textContent = cur === STEPS.length - 1 ? 'Done' : 'Next →';
}

function goTo(i) { cur = i; renderNav(); renderContent(); window.scrollTo({top:0,behavior:'smooth'}); }
function nav(d) { if (cur+d >= 0 && cur+d < STEPS.length) goTo(cur+d); }

renderNav();
renderContent();
</script>
